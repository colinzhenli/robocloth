defaults:
  - _self_

# ---------------------------------------------------------------------------
# Scene
# ---------------------------------------------------------------------------
scene:
  # Override the teaser-assets root with the TEASER_SCENE_ROOT env var
  # (folder that contains room_2/room/room.xml).
  xml_path: ${oc.env:TEASER_SCENE_ROOT,/media/raid/cloth/output/Misuba_rendering/teaser}/room_2/room/room.xml

# ---------------------------------------------------------------------------
# Per-shape BRDF assignment (v3)
#
# All checkpoints resolve under Stage-2-Finals/Ours (subfolder Ours_epoch* for
# repeated materials 226/314/370; flat Stage2_* only for 190/311 which have no
# subfolder). No material repeated.
#   sofas   : 370 (left)  453 (right)
#   carpet  : 190
#   pillows : 8 9 26 50 367 145 226 314   (8 distinct)
#   curtains: 452  311                    (fabric, per earlier discussion)
# ---------------------------------------------------------------------------
# room_2 scene (corrected layout; original shape ids). Clean original mapping.
# Curtains left on their default (green) materials for now — room_2 has a
# different multi-mesh curtain set; revisit if neural curtains are wanted.
objects:
  # Sofas
  elm__52: ours_370     # Cloud_Sofa-Fabric.ply         (left sofa)
  elm__54: ours_453     # Cloud_Sofa001-Fabric.001.ply  (right sofa)
  # Carpet
  elm__43: ours_190_5x  # carpet-carpet.ply (5x smaller tiling)
  # Pillows / cushions
  elm__2:  ours_8       # polstar_3.ply
  elm__3:  ours_9       # Pillow_008.ply
  elm__5:  ours_452     # Pillow_007.ply
  elm__55: ours_226     # Pillow.ply
  elm__56: ours_367     # Round_Pillow.ply  (green round)
  elm__57: ours_145     # Pillow_002.ply    (tufted cube cushion)
  elm__58: ours_311     # LovePillow_002.ply
  elm__59: ours_314     # Pillow_001.ply
  # Curtains (fabric). LEFT window (+z): drapes + valances; RIGHT window (-z): drape + hem.
  elm__29:  ours_50     # curtains_001.ply              (left drape)
  elm__301: ours_50     # curtains.ply                  (left drape)
  elm__303: ours_50     # curtains_003-curtain.ply      (left valance)
  elm__304: ours_50     # curtains_003-curtain.green.ply (left valance)
  elm__302: ours_26     # curtains_002.ply              (right drape)
  elm__30:  ours_26     # curtains_004.ply              (right hem)

# ---------------------------------------------------------------------------
# Path-tracer parameters
# ---------------------------------------------------------------------------
render:
  spp: 1024
  batch_spp: 2     # 4K: keep per-batch sample count within neural-BRDF memory ceiling

variant: cuda_ad_rgb

# Camera + output resolution
fov: 60
resx: 3840
resy: 2160

# Per-shape UV tiling (uv multiplier; BSDF default 3.0). Carpet 5x via ours_190_5x.yaml.
tiling_map:
  elm__54: 12.0    # right sofa    — 4x smaller
  elm__29: 16.0    # curtains (left) — 16x on corrected xatlas UV (curtains_uv2)
  elm__301: 16.0
  elm__303: 16.0
  elm__304: 16.0
  elm__302: 12.0   # curtains (right)
  elm__30: 12.0

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output_base: /media/raid/cloth/output/Misuba_rendering/teaser/cloud_sofa_v3
output_name: v3_final_4k

sample_num: 1048576

hydra:
  job:
    chdir: false
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
