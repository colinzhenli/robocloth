type: "AnisotropicLatentTexturedModel"
module: "model.neural_brdf"
latent_dim: 16
predict_frame: True
use_nerfstudio_sh: False

gt_frame: False
colorful_texture: True
leaky_relu: True
texture_resolution: 3072
hidden_layers: [128, 128, 64, 32, 16]
# hidden_layers: [256, 256, 128, 64, 32, 16]
Gaussian_blur: True
activation: "relu"
input_channels: 9

# neural geometry 
neural_geometry:
  enable: True
  latent_dim: 16  
  hidden_layers: [16, 16, 8]
  output_channels: 2 # 2D uv offset
  local_wi_wo: False # Use local or global wi-wo
  positional_encoding: False # Use position encoding or not
  recompute_frame: False
  factor: 0.4
