defaults:
  - renderer: ours
  - _self_

# Material sample id (e.g. felt09, felt01).  Used in ckpt / BTF paths and
# as a folder name in output_base.
material_id: felt09

# Path-tracer parameters
render:
  width: 1024
  height: 1024
  spp: 16
  batch_spp: 2
  max_depth: 4

# Mitsuba variant. cuda_ad_rgb runs the path tracer + drjit on GPU; the
# neural BRDF (torch) and the BTF interpolator (torch+CUDA, post-port) stay
# resident on GPU. Fall back to llvm_ad_rgb only if CUDA is unavailable.
variant: cuda_ad_rgb

# Point-light intensity (single scalar; applied to all RGB channels).
point_intensity: 10.0

# Lighting selection: "point" | "constant" | "all"
lighting: all

# Camera. Matches the convention of `render_v0.9` (commit 64ed066, Jul-2025):
# Y-up, camera placed on the -Z side, looking along +Z toward the origin,
# fov=30°. That's the original "object centered on Z axis, horizontal view"
# convention used by all the early renderer scripts and obj_rot_video.py.
# The pulled-back origin (z=-5 vs the original -2) accommodates a unit-or-
# bigger sphere — render_v0.9 used a tiny scale-0.2 cloth.obj so its camera
# at z=-2 sat well outside the geometry; for a sphere_scale=2 sphere we
# need to be further back. Override per-render via Hydra (camera.origin=...,
# camera.target=..., camera.fov=...).
camera:
  origin: [0, 0, -5]
  target: [0, 0, 0]
  fov: 30.0

# Output: <output_base>/<material_id>/<renderer_name>/<lighting>.png
# Lives outside the repo so renders / Hydra logs aren't tracked by git.
output_base: /media/raid/cloth/output/Misuba_rendering/output/render

# Misc legacy fields kept for backward compatibility with other scripts
sample_num: 1048576

hydra:
  job:
    chdir: false
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
