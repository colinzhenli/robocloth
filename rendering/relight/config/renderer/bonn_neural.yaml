# @package _global_
# Neural Bonn-dataset renderer (BonnLatentBRDF): per-texel latent bank + MLP
# BRDFDecoder. Handles the Bonn/MERL/Ours stage-2 checkpoints (all neural).
# ckpt_path is overridden per-material/method by the scheduler. The per-material
# H,W latent grid is resolved by the loader from bonn_point_metadata.json.
# apply_cosine_at_eval=true: stage-2 trained with apply_cosine_weight=True, so the
# decoder learned cosine-free BRDF and the renderer multiplies the cosine.
renderer_name: bonn_neural
material_type: BonnLatentBRDF
use_btf: false
btf_path: ""
ckpt_path: /media/raid/cloth/output/BRDF/Stage-2-Finals/Bonn/32/Bonn_epoch120.ckpt
apply_cosine_at_eval: true
