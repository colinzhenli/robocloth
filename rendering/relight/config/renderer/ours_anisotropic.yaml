# @package _global_
# AnisotropicLatentTexturedModel — Stage-2 "Ours" finetune on real-captured
# material samples (the "Ours dataset"). This is a different network family
# than UBOLatentBRDF (used for the UBO test set); the latent layout is a
# learned 24-D texture (texture_resolution × texture_resolution × 24) plus a
# 6-D predicted-frame channel, sampled bilinearly by surface UV.
#
# Default ckpt is material-314; override with cfg.ckpt_path for other Ours
# materials (e.g. 226, 311 also live in /media/raid/cloth/output/BRDF/Stage-2-Finals/).
renderer_name: ours_anisotropic
material_type: AnisotropicLatentTexturedModel
use_btf: false
btf_path: ""
ckpt_path: /media/raid/cloth/output/BRDF/Stage-2-Finals/Stage2_Ours_Material-314.ckpt
apply_cosine_at_eval: false  # the model already multiplies brdf*G internally
