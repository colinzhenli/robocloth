# Root config for the two-stage training pipeline.
# Every field is overridable on the command line (Hydra); the scripts under
# scripts/ set dataset_folder / output_folder / experiment_name explicitly.
defaults:
  - data: stage1_dense
  - renderer: robocloth_rig
  - model: base
  - material: stage1_prior

experiment_name: test
dataset_folder: ???                 # dataset root (stage 1) or material folder (stage 2)
output_folder: ./outputs
exp_output_root_path: ${output_folder}/${experiment_name}
gt_folder: ${dataset_folder}/hdr    # captured HDR views (stage 2 / evaluation)
global_train_seed: 42
