#load images chunk to memory
chunk_size: 200 # 0 means no chunking
switch_iters: 3000 # switch chunk every 10000 steps
random_chunks: True # whether to sample chunks randomly or sequentially with shuffling at wrap

importance_sampling: False
use_single_chunk_sampling: False
uniform_sampling: False
importance_sampling_num: 32768 # number of pixels to sample with importance sampling
batch_size: 1 # equal to train_num

multi_resolution: False
downsample_iter: [-1, -1]

debug: False # no random permutation when debugging
debug_num: 1
training_list_path: ${dataset_folder}/training_list.txt
valid_on_train_set: False
val_ratio: 0.01
visualize_uv: False
start_idx: 0
valid_num: 20 # Actual validation number during training
use_fixed_val: False
hold_out_val_num: 240 # The first hold_out_val_num images are used for validation
legacy_swap_indexing: False # whether to swap the indexing of the first two dimensions of the data (for compatibility with older datasets)
# Path to replace_list.json (used only when legacy_swap_indexing=True). Stored
# here so renderer/emitter and material configs can interpolate it without
# crashing; the file itself only needs to exist for Dataset_Nov11 continue-
# training runs (other datasets ignore it).
replace_list_path: ${dataset_folder}/replace_list.json

