# Color correction matrix (CCM) for camera calibration
# Applied to linear RGB values: corrected_rgb = raw_rgb @ CCM
ccm: [
  [3.6724617, -0.94800931, 0.08428962],
  [-0.44629176, 2.96095854, -1.17898539],
  [-0.47909694, -0.39991418, 2.10705124]
] # Original CCM
