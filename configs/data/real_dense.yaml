defaults:
  - base

dataset_name: "real_dense"
pbr_path:
shape:
  type: "real"
  center: [0.0, 0.0, 0.0]
  radius: 0.2

pixel: True
ray_diff: True
custom_c2w: True

metadata_path: ${dataset_folder}/scan_log.json
camera_metadata_path: ${dataset_folder}/rotated_camera.json
handeye_refiner: False

# Dense loader: all images preloaded into RAM once. Chunk-related fields are
# kept for documentation (and to override base.yaml's defaults) but are unused.
chunk_size: 0
switch_iters: 999999999
random_chunks: False
use_single_chunk_sampling: False
downsample_iter: [-1, -1]
