defaults:
  - base

dataset_name: "merl"
pbr_path: 
shape:
  type: "real"
  center: [0.0, 0.0, 0.0]
  radius: 0.2

pixel: True
ray_diff: True
custom_c2w: True
filter_observations: False # whether to filter observations by XY region

# Train/test split lists (one material name per line, e.g. "alum-bronze")
training_list_path: ${dataset_folder}/training_list.txt
test_list_path: ${dataset_folder}/test_list.txt

metadata_path: ${dataset_folder}/scan_log.json
# metadata_path: /media/raid/cloth/capture_data/BRDF_recon_Oct21_color_checker_5_distance_grey_center/scan_log.json
# metadata_path: /media/raid/cloth/No_cable_capture_Sep22/BRDF_recon_Sep30/scan_log.json
# metadata_path: /media/raid/cloth/capture_data/BRDF_recon_Oct20_white_test/scan_log.json
camera_metadata_path: ${dataset_folder}/rotated_camera.json
handeye_refiner: False # whether to learn the refiner