type: "MERLBRDF"
module: "models.neural_brdf_refactored"
data_folder: ${dataset_folder}
num_materials: 1
start_material_id: 0
latent_dim: 16
predict_frame: True
use_pos_enc: True
different_decoder: False
init_std: 0.1
use_latent_bank: False

# Decoder config (passed to BRDFDecoder)
# decoder:
#   hidden_layers: [128, 128, 64, 32, 16]
#   activation: "relu"
#   output_channels: 3
#   degree: 3  # SH degree for positional encoding

decoder:
  input_channels: 3
  use_film: False
  use_color_decomp: False
  color_latent_dim: 6
  smooth_reg: False
  smooth_reg_eps: 0.02
  use_skip_connection: True
  skip_layer: 2
  activation: "softplus"
  hidden_layers: [256, 256, 256, 256]
  intermediate_activation: "leakyrelu"
  output_channels: 3
  degree: 3  # SH degree for positional encoding